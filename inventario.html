<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <script>(function(){if(!sessionStorage.getItem('plg_session'))location.replace('/login.html');})()</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inventario IT - PLG</title>
  <style>
    :root { --navy:#1B3A6B; --blue:#2F5AA8; --red:#CC1F2A; --bg:#F0F4F9; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:'Segoe UI',sans-serif; background:var(--bg); color:#333; }

    header { background:linear-gradient(135deg,var(--navy),var(--blue)); color:white; border-bottom:4px solid var(--red); }
    .header-inner { display:flex; align-items:center; gap:20px; padding:14px 32px; }
    .header-logo-wrap { background:white; border-radius:8px; padding:6px 12px; display:flex; align-items:center; }
    .header-logo { height:52px; width:auto; display:block; }
    .header-divider { width:1px; height:40px; background:rgba(255,255,255,0.25); }
    header h1 { font-size:20px; font-weight:700; }
    header p  { font-size:12px; opacity:.7; margin-top:3px; }
    .nav-tabs { background:var(--navy); display:flex; padding:0 32px; }
    .nav-tab { padding:10px 22px; color:rgba(255,255,255,.65); font-size:13px; font-weight:600; cursor:pointer; border:none; background:none; border-bottom:3px solid transparent; transition:all .2s; text-decoration:none; display:inline-flex; align-items:center; }
    .nav-tab:hover { color:white; }
    .nav-tab.activo { color:white; border-bottom-color:var(--red); }

    .controles { background:white; padding:14px 32px; display:flex; gap:10px; flex-wrap:wrap; align-items:center; border-bottom:1px solid #dde3ed; position:sticky; top:0; z-index:10; box-shadow:0 2px 8px rgba(27,58,107,.08); }
    .buscar { flex:1; min-width:220px; padding:9px 14px; border:1px solid #c5cedb; border-radius:6px; font-size:14px; }
    .buscar:focus { outline:none; border-color:var(--blue); box-shadow:0 0 0 3px rgba(47,90,168,.1); }
    .sel { padding:8px 10px; border:1px solid #c5cedb; border-radius:6px; font-size:13px; color:#555; background:white; cursor:pointer; }
    .btn-nuevo { padding:9px 18px; background:var(--navy); color:white; border:none; border-radius:6px; font-size:13px; font-weight:600; cursor:pointer; }
    .btn-nuevo:hover { background:var(--blue); }
    .contador { font-size:13px; color:#778; }

    .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:16px; padding:24px 32px; }

    .tarjeta { background:white; border-radius:10px; box-shadow:0 1px 4px rgba(27,58,107,.07); border-top:4px solid var(--navy); cursor:pointer; transition:box-shadow .2s,border-color .2s; overflow:hidden; }
    .tarjeta:hover { box-shadow:0 6px 20px rgba(27,58,107,.14); border-top-color:var(--red); }
    .tarjeta-header { padding:16px 18px 10px; display:flex; align-items:center; gap:12px; }
    .avatar { width:52px; height:52px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:18px; font-weight:700; color:white; flex-shrink:0; }
    .user-info { flex:1; min-width:0; }
    .user-nombre { font-size:14px; font-weight:700; color:var(--navy); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .user-puesto { font-size:11px; color:#888; margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .tarjeta-body { padding:0 18px 14px; }
    .badge-div { display:inline-block; font-size:10px; font-weight:700; padding:2px 9px; border-radius:10px; background:#e4ecf7; color:var(--navy); margin-bottom:8px; }
    .equipo-chips { display:flex; flex-wrap:wrap; gap:5px; }
    .chip { display:inline-flex; align-items:center; gap:4px; font-size:11px; padding:3px 8px; border-radius:6px; background:#f1f5f9; color:#475569; border:1px solid #e2e8f0; }
    .chip.ok { background:#d1fae5; color:#065f46; border-color:#6ee7b7; }
    .chip.mail { background:#dbeafe; color:#1e40af; border-color:#bfdbfe; }

    .sin-datos { grid-column:1/-1; text-align:center; padding:60px; color:#888; font-size:15px; }
    .cargando { grid-column:1/-1; text-align:center; padding:60px; color:#888; }
    .spinner { width:36px; height:36px; border:4px solid #dde3ed; border-top-color:var(--blue); border-radius:50%; animation:spin .8s linear infinite; margin:0 auto 12px; }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* Modal */
    .overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:100; align-items:flex-start; justify-content:center; padding:20px; overflow-y:auto; }
    .overlay.activo { display:flex; }
    .modal { background:white; border-radius:12px; width:100%; max-width:680px; margin:auto; }
    .modal-header { background:linear-gradient(135deg,var(--navy),var(--blue)); padding:20px 24px; display:flex; align-items:center; gap:14px; border-radius:12px 12px 0 0; border-bottom:3px solid var(--red); }
    .modal-avatar { width:52px; height:52px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:20px; font-weight:700; color:white; border:3px solid rgba(255,255,255,.4); flex-shrink:0; }
    .modal-header-info { flex:1; }
    .modal-header-info h2 { font-size:17px; color:white; font-weight:700; margin:0; }
    .modal-header-info p  { font-size:12px; color:rgba(255,255,255,.75); margin-top:3px; }
    .btn-x { background:none; border:none; color:rgba(255,255,255,.7); font-size:24px; cursor:pointer; line-height:1; padding:0 4px; }
    .btn-x:hover { color:white; }
    .modal-body { padding:24px; }

    .seccion { margin-bottom:22px; }
    .seccion-titulo { font-size:12px; font-weight:700; color:#556; text-transform:uppercase; letter-spacing:.5px; margin-bottom:12px; padding-bottom:6px; border-bottom:1px solid #edf0f5; display:flex; align-items:center; gap:6px; }
    .info-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .info-item { background:#f8fafc; border-radius:7px; padding:10px 12px; }
    .info-item label { font-size:10px; font-weight:700; color:#778; text-transform:uppercase; letter-spacing:.4px; display:block; margin-bottom:3px; }
    .info-item .valor { font-size:13px; color:#333; word-break:break-all; }
    .info-item .valor.mono { font-family:monospace; font-size:12px; }
    .pass-wrap { display:flex; align-items:center; gap:6px; }
    .pass-val { font-family:monospace; font-size:12px; color:#333; flex:1; word-break:break-all; }
    .btn-eye { background:none; border:none; cursor:pointer; color:#aaa; font-size:14px; padding:0; flex-shrink:0; }
    .btn-eye:hover { color:var(--blue); }
    .no-dato { color:#bbb; font-size:12px; font-style:italic; }

    .equipo-card { background:#f8fafc; border:1px solid #e2e8f0; border-radius:8px; padding:12px 14px; display:flex; align-items:flex-start; gap:12px; }
    .equipo-icon { font-size:24px; flex-shrink:0; width:36px; text-align:center; }
    .equipo-datos { flex:1; min-width:0; }
    .equipo-modelo { font-size:13px; font-weight:600; color:#333; }
    .equipo-serie  { font-size:11px; color:#888; margin-top:2px; font-family:monospace; }
    .equipos-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }

    .modal-footer { display:flex; gap:10px; justify-content:flex-end; padding:0 24px 20px; }
    .btn-edit { padding:8px 18px; background:var(--navy); color:white; border:none; border-radius:6px; font-size:13px; font-weight:600; cursor:pointer; }
    .btn-edit:hover { background:var(--blue); }
    .btn-close { padding:8px 16px; border:1px solid #c5cedb; border-radius:6px; background:white; font-size:13px; cursor:pointer; }

    /* Modal Form */
    .overlay-form { display:none; position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:200; align-items:flex-start; justify-content:center; padding:20px; overflow-y:auto; }
    .overlay-form.activo { display:flex; }
    .modal-form { background:white; border-radius:12px; width:100%; max-width:640px; margin:auto; }
    .form-header { background:linear-gradient(135deg,var(--navy),var(--blue)); padding:18px 24px; display:flex; justify-content:space-between; align-items:center; border-radius:12px 12px 0 0; border-bottom:3px solid var(--red); }
    .form-header h2 { font-size:16px; color:white; font-weight:700; margin:0; }
    .form-body { padding:22px; }
    .form-section { font-size:11px; font-weight:700; color:#556; text-transform:uppercase; letter-spacing:.5px; margin:16px 0 10px; padding-bottom:4px; border-bottom:1px solid #edf0f5; }
    .campo { margin-bottom:13px; }
    .campo label { display:block; font-size:11px; font-weight:700; color:#556; text-transform:uppercase; letter-spacing:.4px; margin-bottom:5px; }
    .campo input, .campo select { width:100%; padding:8px 11px; border:1px solid #c5cedb; border-radius:6px; font-size:13px; font-family:inherit; }
    .campo input:focus, .campo select:focus { outline:none; border-color:var(--blue); }
    .g2 { display:grid; grid-template-columns:1fr 1fr; gap:0 14px; }
    .form-footer { display:flex; gap:10px; justify-content:flex-end; margin-top:16px; }
    .btn-del { padding:8px 14px; background:#fee2e2; color:#991b1b; border:1px solid #fca5a5; border-radius:6px; font-size:13px; font-weight:600; cursor:pointer; margin-right:auto; }
    .btn-cancel { padding:8px 16px; border:1px solid #c5cedb; border-radius:6px; background:white; font-size:13px; cursor:pointer; }
    .btn-save { padding:8px 18px; background:var(--navy); color:white; border:none; border-radius:6px; font-size:13px; font-weight:600; cursor:pointer; }
    .btn-save:hover { background:var(--blue); }
    .msg { padding:10px 13px; border-radius:7px; font-size:12px; margin-bottom:12px; }
    .msg.ok  { background:#d1fae5; color:#065f46; border:1px solid #6ee7b7; }
    .msg.err { background:#fee2e2; color:#991b1b; border:1px solid #fca5a5; }

    @media(max-width:600px){ .info-grid,.equipos-grid,.g2{ grid-template-columns:1fr; } }
  </style>
</head>
<body>
<header>
  <div class="header-inner">
    <div class="header-logo-wrap"><img src="log PLG.png" alt="PLG" class="header-logo"></div>
    <div class="header-divider"></div>
    <div><h1>Inventario Informático</h1><p>PANAMERICAN LOGISTICS GROUP</p></div>
  </div>
  <nav class="nav-tabs">
    <a href="index.html" class="nav-tab">🏠 Portal Principal</a>
    <a href="inventario.html" class="nav-tab activo">💻 Inventario IT</a>
    <a href="tickets.html" class="nav-tab">🎫 Tickets IT</a>
    <button class="nav-tab" style="margin-left:auto;color:rgba(255,255,255,.55);" onclick="sessionStorage.removeItem('plg_session');location.href='/login.html'">🔒 Cerrar sesión</button>

</header>

<div class="controles">

  <select class="sel" id="f-div" onchange="filtrar()">
    <option value="">Todas las divisiones</option>
    <option value="PLG DIVISION ADUANAS">PLG DIVISION ADUANAS</option>
    <option value="PLG DE EL SALVADOR">PLG DE EL SALVADOR</option>
    <option value="PLG DIVISION TERRESTRE">PLG DIVISION TERRESTRE</option>
    <option value="PLG DOMINICANA">PLG DOMINICANA</option>
    <option value="PLG GROUP">PLG GROUP</option>
  </select>
  <span class="contador" id="contador"></span>
  <button class="btn-nuevo" onclick="abrirForm(null)">+ Agregar Usuario</button>
</div>

<div class="grid" id="grid">
  <div class="cargando"><div class="spinner"></div><p>Cargando usuarios...</p></div>
</div>

<!-- Modal Detalle -->
<div class="overlay" id="overlayDetalle">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-avatar" id="d-avatar"></div>
      <div class="modal-header-info">
        <h2 id="d-nombre"></h2>
        <p id="d-puesto-div"></p>
      </div>
      <button class="btn-x" onclick="cerrarDetalle()">×</button>
    </div>
    <div class="modal-body">

      <div class="seccion">
        <div class="seccion-titulo">👤 Información General</div>
        <div class="info-grid">
          <div class="info-item"><label>Área / Departamento</label><div class="valor" id="d-area"></div></div>
          <div class="info-item"><label>Teléfono / Ext.</label><div class="valor" id="d-tel"></div></div>
          <div class="info-item"><label>Hostname</label><div class="valor mono" id="d-host"></div></div>
          <div class="info-item"><label>AnyDesk ID</label><div class="valor mono" id="d-anydesk"></div></div>
        </div>
      </div>

      <div class="seccion">
        <div class="seccion-titulo">📧 Cuentas</div>
        <div class="info-grid">
          <div class="info-item">
            <label>Microsoft / Office 365</label>
            <div class="valor" id="d-ms-email"></div>
            <div class="pass-wrap" style="margin-top:5px;">
              <span class="pass-val" id="d-ms-pass"></span>
              <button class="btn-eye" onclick="togglePass('d-ms-pass','d-ms-raw')">👁</button>

          <div class="info-item">
            <label>Gmail</label>

              <button class="btn-eye" onclick="togglePass('d-gm-pass','d-gm-raw')">👁</button>

            <span id="d-gm-raw" style="display:none"></span>
          </div>

            <label>Magaya</label>
            <div class="valor" id="d-mag-user"></div>
            <div class="pass-wrap" style="margin-top:5px;">

              <button class="btn-eye" onclick="togglePass('d-mag-pass','d-mag-raw')">👁</button>

<!-- Modal Formulario -->

            <option value="PLG DE EL SALVADOR">PLG DE EL SALVADOR</option>
            <option value="PLG DIVISION TERRESTRE">PLG DIVISION TERRESTRE</option>
            <option value="PLG DOMINICANA">PLG DOMINICANA</option>

        <button class="btn-save" id="btn-save" onclick="guardar()">Guardar</button>

</div>

<script>
  const COLORES = ['#1B3A6B','#2F5AA8','#CC1F2A','#065f46','#92400e','#5b21b6','#9d174d','#9a3412'];
  function colorAvatar(n) { var s=0; for(var i=0;i<n.length;i++) s+=n.charCodeAt(i); return COLORES[s%COLORES.length]; }
  function iniciales(n) { return (n||'').split(' ').filter(Boolean).slice(0,2).map(p=>p[0]).join('').toUpperCase(); }
  function esc(s) { var d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }
  function vacio(v) { return !v || v.trim()==='' || v.trim().toUpperCase()==='NO POSEE' || v.trim()==='*'; }

  let usuarios = [], detalleId = null;

  async function cargar() {
    try {
      const res = await fetch('/api/usuarios');
      if (!res.ok) throw new Error('Error '+res.status);
      usuarios = await res.json();
      filtrar();
    } catch(e) {
      document.getElementById('grid').innerHTML = '<div class="sin-datos">Error al cargar: '+e.message+'</div>';
    }
  }

  function filtrar() {
    const q   = document.querySelector('.buscar').value.toLowerCase();
    const div = document.getElementById('f-div').value;
    const res = usuarios.filter(u => {
      const mD = !div || u.division === div;
      const mQ = !q  || [u.nombre,u.microsoftEmail,u.gmailEmail,u.puesto,u.area,u.laptopSerie,u.celularImei,u.hostname].some(v=>v&&v.toLowerCase().includes(q));
      return mD && mQ;
    });
    renderizar(res);
  }

  function renderizar(lista) {
    document.getElementById('contador').textContent = lista.length + ' usuario' + (lista.length!==1?'s':'');
    if (!lista.length) { document.getElementById('grid').innerHTML='<div class="sin-datos">No se encontraron usuarios.</div>'; return; }

    document.getElementById('grid').innerHTML = lista.map(u => {
      const col  = colorAvatar(u.nombre||'?');
      const ini  = iniciales(u.nombre||'?');
      const divCorto = (u.division||'').replace('PLG ','').replace('DIVISION ','DIV. ');
      const chips = [
        u.laptopModelo  ? `<span class="chip ok">💻 ${esc(u.laptopModelo.split(' ').slice(0,3).join(' '))}</span>` : '',
        u.celularModelo ? `<span class="chip ok">📱 ${esc(u.celularModelo.split(' ').slice(0,3).join(' '))}</span>` : '',
        u.microsoftEmail? `<span class="chip mail">✉️ Office 365</span>` : '',
        u.gmailEmail    ? `<span class="chip mail">✉️ Gmail</span>` : '',
      ].filter(Boolean).join('');
      return `<div class="tarjeta" onclick="verDetalle('${u.id}')">
        <div class="tarjeta-header">
          <div class="avatar" style="background:${col}">${ini}</div>
          <div class="user-info">
            <div class="user-nombre">${esc(u.nombre)}</div>
            <div class="user-puesto">${esc(u.puesto||u.area||'')}</div>
          </div>
        </div>
        <div class="tarjeta-body">
          ${divCorto ? `<span class="badge-div">${esc(divCorto)}</span>` : ''}
          <div class="equipo-chips">${chips}</div>
        </div>
      </div>`;
    }).join('');
  }

  function verDetalle(id) {
    const u = usuarios.find(x=>x.id===id);
    if (!u) return;
    detalleId = id;
    const col = colorAvatar(u.nombre||'?');
    document.getElementById('d-avatar').style.background = col;
    document.getElementById('d-avatar').textContent = iniciales(u.nombre||'?');
    document.getElementById('d-nombre').textContent = u.nombre||'—';
    document.getElementById('d-puesto-div').textContent = [u.puesto, u.division].filter(Boolean).join(' · ');
    document.getElementById('d-area').textContent    = u.area     || '—';
    document.getElementById('d-tel').textContent     = [u.telefono, u.extension ? 'Ext. '+u.extension : ''].filter(Boolean).join(' / ') || '—';
    document.getElementById('d-host').textContent    = u.hostname || '—';
    document.getElementById('d-anydesk').textContent = u.anydesk  || '—';

    // Cuentas
    setPass('d-ms',  u.microsoftEmail, u.microsoftPass);
    setPass('d-gm',  u.gmailEmail,     u.gmailPass);
    setMag(u.magayaUser, u.magayaPass);

    // Equipos
    setEquipo('eq-laptop',  'd-laptop', u.laptopModelo,  u.laptopSerie,  'Sin laptop asignada');
    setEquipo('eq-monitor', 'd-mon',    u.monitorModelo, u.monitorSerie, 'Sin monitor asignado');
    setEquipo('eq-celular', 'd-cel',    u.celularModelo, u.celularImei,  'Sin celular asignado');
    setEquipo('eq-tablet',  'd-tab',    u.tabletModelo,  u.tabletImei,   'Sin tablet asignada');

    document.getElementById('overlayDetalle').classList.add('activo');
  }

  function setPass(pre, email, pass) {
    document.getElementById(pre+'-email').textContent = email || '—';
    if (pass) {
      document.getElementById(pre+'-raw').textContent = pass;
      document.getElementById(pre+'-pass').textContent = '••••••••';
    } else {
      document.getElementById(pre+'-pass').textContent = '—';
      document.getElementById(pre+'-raw').textContent = '';
    }
  }

  function setMag(user, pass) {
    document.getElementById('d-mag-user').textContent = user || '—';
    if (pass) {
      document.getElementById('d-mag-raw').textContent = pass;
      document.getElementById('d-mag-pass').textContent = '••••••••';
    } else {
      document.getElementById('d-mag-pass').textContent = '—';
      document.getElementById('d-mag-raw').textContent = '';
    }
  }

  function setEquipo(cardId, pre, modelo, serie, sinTexto) {
    const card = document.getElementById(cardId);
    if (!vacio(modelo) || !vacio(serie)) {
      document.getElementById(pre+'-mod').textContent = modelo || '—';
      document.getElementById(pre+'-ser').textContent = serie  || '—';
      card.style.opacity = '1';
    } else {
      document.getElementById(pre+'-mod').textContent = sinTexto;
      document.getElementById(pre+'-ser').textContent = '';
      card.style.opacity = '0.4';
    }
  }

  function togglePass(passId, rawId) {
    const el  = document.getElementById(passId);
    const raw = document.getElementById(rawId).textContent;
    if (!raw) return;
    el.textContent = el.textContent === '••••••••' ? raw : '••••••••';
  }

  function cerrarDetalle() { document.getElementById('overlayDetalle').classList.remove('activo'); }
  function editarActual()  { cerrarDetalle(); abrirForm(detalleId); }

  const CAMPOS = ['nombre','div','area','puesto','tel','ext','host','anydesk','ms-email','ms-pass','gm-email','gm-pass','mag-user','mag-pass','lap-mod','lap-ser','mon-mod','mon-ser','cel-mod','cel-ser','tab-mod','tab-ser'];

  function abrirForm(id) {
    const u = id ? usuarios.find(x=>x.id===id) : null;
    document.getElementById('form-titulo').textContent = u ? 'Editar Usuario' : 'Agregar Usuario';
    document.getElementById('btn-del').style.display   = u ? '' : 'none';
    document.getElementById('btn-save').textContent    = u ? 'Guardar Cambios' : 'Agregar';
    document.getElementById('form-msg').innerHTML = '';

    document.getElementById('f-nombre').value   = u ? u.nombre          : '';
    document.getElementById('f-div').value      = u ? u.division        : '';
    document.getElementById('f-area').value     = u ? u.area            : '';
    document.getElementById('f-puesto').value   = u ? u.puesto          : '';
    document.getElementById('f-tel').value      = u ? u.telefono        : '';
    document.getElementById('f-ext').value      = u ? u.extension       : '';
    document.getElementById('f-host').value     = u ? u.hostname        : '';
    document.getElementById('f-anydesk').value  = u ? u.anydesk         : '';
    document.getElementById('f-ms-email').value = u ? u.microsoftEmail  : '';
    document.getElementById('f-ms-pass').value  = u ? u.microsoftPass   : '';
    document.getElementById('f-gm-email').value = u ? u.gmailEmail      : '';
    document.getElementById('f-gm-pass').value  = u ? u.gmailPass       : '';
    document.getElementById('f-mag-user').value = u ? u.magayaUser      : '';
    document.getElementById('f-mag-pass').value = u ? u.magayaPass      : '';
    document.getElementById('f-lap-mod').value  = u ? u.laptopModelo    : '';
    document.getElementById('f-lap-ser').value  = u ? u.laptopSerie     : '';
    document.getElementById('f-mon-mod').value  = u ? u.monitorModelo   : '';
    document.getElementById('f-mon-ser').value  = u ? u.monitorSerie    : '';
    document.getElementById('f-cel-mod').value  = u ? u.celularModelo   : '';
    document.getElementById('f-cel-ser').value  = u ? u.celularImei     : '';
    document.getElementById('f-tab-mod').value  = u ? u.tabletModelo    : '';
    document.getElementById('f-tab-ser').value  = u ? u.tabletImei      : '';

    document.getElementById('overlayForm').classList.add('activo');
    window._editId = id || null;
  }

  function cerrarForm() { document.getElementById('overlayForm').classList.remove('activo'); }

  async function guardar() {
    const nombre = document.getElementById('f-nombre').value.trim();
    if (!nombre) { mostrarMsg('err','El nombre es obligatorio.'); return; }
    const btn = document.getElementById('btn-save');
    btn.disabled = true;
    const payload = {
      nombre,
      division:       document.getElementById('f-div').value,
      area:           document.getElementById('f-area').value.trim(),
      puesto:         document.getElementById('f-puesto').value.trim(),
      telefono:       document.getElementById('f-tel').value.trim(),
      extension:      document.getElementById('f-ext').value.trim(),
      hostname:       document.getElementById('f-host').value.trim(),
      anydesk:        document.getElementById('f-anydesk').value.trim(),
      microsoftEmail: document.getElementById('f-ms-email').value.trim(),
      microsoftPass:  document.getElementById('f-ms-pass').value.trim(),
      gmailEmail:     document.getElementById('f-gm-email').value.trim(),
      gmailPass:      document.getElementById('f-gm-pass').value.trim(),
      magayaUser:     document.getElementById('f-mag-user').value.trim(),
      magayaPass:     document.getElementById('f-mag-pass').value.trim(),
      laptopModelo:   document.getElementById('f-lap-mod').value.trim(),
      laptopSerie:    document.getElementById('f-lap-ser').value.trim(),
      monitorModelo:  document.getElementById('f-mon-mod').value.trim(),
      monitorSerie:   document.getElementById('f-mon-ser').value.trim(),
      celularModelo:  document.getElementById('f-cel-mod').value.trim(),
      celularImei:    document.getElementById('f-cel-ser').value.trim(),
      tabletModelo:   document.getElementById('f-tab-mod').value.trim(),
      tabletImei:     document.getElementById('f-tab-ser').value.trim()
    };
    try {
      let res, item;
      if (window._editId) {
        payload.id = window._editId;
        res  = await fetch('/api/usuarios?id='+encodeURIComponent(window._editId), { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload) });
        item = await res.json();
        const idx = usuarios.findIndex(x=>x.id===window._editId);
        if (idx!==-1) usuarios[idx] = { ...usuarios[idx], ...payload };
      } else {
        res  = await fetch('/api/usuarios', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload) });
        item = await res.json();
        usuarios.unshift(item);
      }
      if (!res.ok) throw new Error(item.error||'Error');
      filtrar();
      cerrarForm();
    } catch(e) {
      mostrarMsg('err','Error al guardar: '+e.message);
    }
    btn.disabled = false;
  }

  async function eliminar() {
    if (!window._editId || !confirm('¿Eliminar este usuario del inventario?')) return;
    try {
      await fetch('/api/usuarios?id='+encodeURIComponent(window._editId), { method:'DELETE' });
      usuarios = usuarios.filter(x=>x.id!==window._editId);
      filtrar(); cerrarForm();
    } catch(e) { mostrarMsg('err','Error: '+e.message); }
  }

  function mostrarMsg(t,txt) { document.getElementById('form-msg').innerHTML='<div class="msg '+t+'">'+txt+'</div>'; }

  document.addEventListener('keydown', e => { if(e.key==='Escape'){ cerrarDetalle(); cerrarForm(); } });
  cargar();
</script>
</body>
</html>
