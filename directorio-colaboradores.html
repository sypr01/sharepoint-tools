<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Directorio de Colaboradores - PLG</title>
  <style>
    :root {
      --plg-navy:  #1B3A6B;
      --plg-blue:  #2F5AA8;
      --plg-light: #5C83C1;
      --plg-red:   #CC1F2A;
      --plg-bg:    #F0F4F9;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: var(--plg-bg); color: #333; }

    header {
      background: linear-gradient(135deg, var(--plg-navy) 0%, var(--plg-blue) 100%);
      color: white;
      border-bottom: 4px solid var(--plg-red);
    }
    .header-inner {
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 14px 32px;
    }
    .header-logo-wrap {
      background: white;
      border-radius: 8px;
      padding: 6px 12px;
      display: flex;
      align-items: center;
      flex-shrink: 0;
    }
    .header-logo { height: 52px; width: auto; display: block; }
    .header-divider { width: 1px; height: 40px; background: rgba(255,255,255,0.25); }
    header h1 { font-size: 20px; font-weight: 700; }
    header p  { font-size: 12px; opacity: 0.7; margin-top: 3px; }

    .controles {
      background: white;
      padding: 14px 32px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      border-bottom: 1px solid #dde3ed;
      position: sticky;
      top: 0;
      z-index: 10;
      box-shadow: 0 2px 8px rgba(27,58,107,0.08);
    }
    .buscar {
      flex: 1;
      min-width: 220px;
      padding: 9px 14px;
      border: 1px solid #c5cedb;
      border-radius: 6px;
      font-size: 14px;
    }
    .buscar:focus { outline: none; border-color: var(--plg-blue); box-shadow: 0 0 0 3px rgba(47,90,168,0.1); }

    .filtros { display: flex; gap: 8px; flex-wrap: wrap; }
    .filtro {
      padding: 6px 14px;
      border: 1px solid #c5cedb;
      border-radius: 20px;
      background: white;
      cursor: pointer;
      font-size: 13px;
      color: #555;
      transition: all 0.2s;
    }
    .filtro:hover { border-color: var(--plg-blue); color: var(--plg-blue); }
    .filtro.activo { background: var(--plg-navy); color: white; border-color: var(--plg-navy); }

    .select-depto {
      padding: 7px 12px;
      border: 1px solid #c5cedb;
      border-radius: 6px;
      font-size: 13px;
      color: #555;
      background: white;
      cursor: pointer;
    }
    .select-depto:focus { outline: none; border-color: var(--plg-blue); }

    .contador { font-size: 13px; color: #778; margin-left: auto; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
      padding: 24px 32px;
    }

    .tarjeta {
      background: white;
      border-radius: 10px;
      padding: 20px;
      box-shadow: 0 1px 4px rgba(27,58,107,0.07);
      border-top: 4px solid var(--plg-navy);
      transition: box-shadow 0.2s, border-color 0.2s;
      text-align: center;
    }
    .tarjeta:hover { box-shadow: 0 6px 20px rgba(27,58,107,0.13); border-top-color: var(--plg-red); }

    .avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      margin: 0 auto 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      font-weight: 700;
      color: white;
      overflow: hidden;
      flex-shrink: 0;
    }
    .avatar img { width: 100%; height: 100%; object-fit: cover; }

    .nombre { font-size: 15px; font-weight: 700; color: var(--plg-navy); margin-bottom: 4px; }
    .cargo  { font-size: 12px; color: #666; margin-bottom: 10px; }

    .badge-depto {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 12px;
      background: #e4ecf7;
      color: var(--plg-navy);
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: .3px;
    }

    /* ── BARRAS DE TELÉFONO ── */
    .phone-bars {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin: 10px 0;
    }
    .phone-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      border-radius: 6px;
      padding: 6px 10px;
      text-align: left;
    }
    .phone-bar.movil  { background: #e8f5e9; }
    .phone-bar.fijo   { background: #e8eef7; }
    .phone-bar-icon   { font-size: 13px; flex-shrink: 0; }
    .phone-bar-content { display: flex; flex-direction: column; gap: 1px; min-width: 0; }
    .phone-bar-lbl {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: .5px;
      color: #888;
      font-weight: 600;
    }
    .phone-bar-val { display: flex; align-items: center; gap: 5px; }
    .phone-link-movil {
      font-size: 12px;
      font-weight: 700;
      color: #107c10;
      text-decoration: none;
    }
    .phone-link-movil:hover { text-decoration: underline; }
    .phone-link-fijo {
      font-size: 12px;
      font-weight: 700;
      color: var(--plg-navy);
      text-decoration: none;
    }
    .phone-link-fijo:hover { text-decoration: underline; }
    .phone-empty { font-size: 11px; color: #aaa; }

    .dato {
      font-size: 12px;
      color: #555;
      margin-bottom: 5px;
      display: flex;
      gap: 6px;
      align-items: center;
      justify-content: center;
      text-align: left;
    }
    .dato a { color: var(--plg-blue); text-decoration: none; }
    .dato a:hover { text-decoration: underline; }

    .badge-oficina {
      display: inline-block;
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 10px;
      background: #f0f4f9;
      color: #667;
      margin-top: 8px;
      border: 1px solid #dde3ed;
    }

    .sin-resultados {
      grid-column: 1/-1;
      text-align: center;
      padding: 60px;
      color: #888;
      font-size: 15px;
    }

    /* ── SKELETON ── */
    @keyframes shimmer {
      0%   { background-position: -600px 0; }
      100% { background-position:  600px 0; }
    }
    .skeleton {
      background: linear-gradient(90deg, #e8edf5 25%, #f5f7fb 50%, #e8edf5 75%);
      background-size: 600px 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 6px;
    }
    .sk-avatar  { width: 72px; height: 72px; border-radius: 50%; margin: 0 auto 12px; }
    .sk-line    { height: 12px; margin: 6px auto; }
    .sk-w80     { width: 80%; }
    .sk-w60     { width: 60%; }
    .sk-w40     { width: 40%; }
    .sk-bar     { height: 34px; border-radius: 6px; margin: 6px 0; }

    /* ── ESTADO CARGA ── */
    .cargando {
      grid-column: 1/-1;
      text-align: center;
      padding: 60px;
      color: #888;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 4px solid #dde3ed;
      border-top-color: var(--plg-blue);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── BADGE CACHÉ ── */
    .cache-badge {
      font-size: 11px;
      color: #107c10;
      background: #e8f5e9;
      border: 1px solid #c8e6c9;
      border-radius: 10px;
      padding: 2px 8px;
      margin-left: 8px;
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="header-logo-wrap">
      <img src="log PLG.png" alt="PLG" class="header-logo">
    </div>
    <div class="header-divider"></div>
    <div style="flex:1;">
      <h1>Directorio de Colaboradores</h1>
      <p>PANAMERICAN LOGISTICS GROUP</p>
    </div>
  </div>
</header>

<div class="controles">
  <input class="buscar" type="text" placeholder="Buscar por nombre, cargo, correo, teléfono..." oninput="filtrar()">
  <div class="filtros" id="filtros-oficina">
    <button class="filtro activo" data-val="" onclick="setFiltroOficina(this)">Todas las divisiones</button>
  </div>
  <select class="select-depto" id="select-depto" onchange="filtrar()">
    <option value="">Todos los departamentos</option>
  </select>
  <span class="contador" id="contador"></span>
</div>

<div class="grid" id="grid">
  <div class="cargando">
    <div class="spinner"></div>
    <p>Cargando colaboradores...</p>
  </div>
</div>

<script>
  const CACHE_KEY = 'plg_colaboradores';
  const CACHE_TTL = 5 * 60 * 1000; // 5 minutos
  const LOTE_INICIAL = 20;

  let colaboradores = [];
  let filtroOficina = '';

  const colores = ['#1B3A6B','#2F5AA8','#CC1F2A','#065f46','#92400e','#5b21b6','#9d174d','#9a3412'];
  function colorAvatar(nombre) {
    var sum = 0;
    for (var i = 0; i < nombre.length; i++) sum += nombre.charCodeAt(i);
    return colores[sum % colores.length];
  }
  function iniciales(nombre) {
    return nombre.split(' ').filter(Boolean).slice(0,2).map(function(p){ return p[0]; }).join('').toUpperCase();
  }

  // ── SKELETON ────────────────────────────────────────────────────────────
  function mostrarSkeletons(n) {
    var html = '';
    for (var i = 0; i < n; i++) {
      html += '<div class="tarjeta">'
        + '<div class="skeleton sk-avatar"></div>'
        + '<div class="skeleton sk-line sk-w80"></div>'
        + '<div class="skeleton sk-line sk-w60"></div>'
        + '<div class="skeleton sk-line sk-w40" style="margin-bottom:10px"></div>'
        + '<div class="skeleton sk-bar"></div>'
        + '<div class="skeleton sk-bar"></div>'
        + '<div class="skeleton sk-line sk-w80" style="margin-top:8px"></div>'
        + '</div>';
    }
    document.getElementById('grid').innerHTML = html;
    document.getElementById('contador').textContent = 'Cargando...';
  }

  // ── TELÉFONOS ────────────────────────────────────────────────────────────
  function renderBarraMovil(val) {
    return '<div class="phone-bar movil">'
      + '<span class="phone-bar-icon">📱</span>'
      + '<div class="phone-bar-content">'
      + '<span class="phone-bar-lbl">Móvil</span>'
      + '<div class="phone-bar-val">'
      + (val ? '<a href="tel:' + val.replace(/\s/g,'') + '" class="phone-link-movil">' + val + '</a>'
             : '<span class="phone-empty">—</span>')
      + '</div></div></div>';
  }

  function renderBarraFijo(val) {
    return '<div class="phone-bar fijo">'
      + '<span class="phone-bar-icon">☎️</span>'
      + '<div class="phone-bar-content">'
      + '<span class="phone-bar-lbl">Tel. oficina</span>'
      + '<div class="phone-bar-val">'
      + (val ? '<a href="tel:' + val.replace(/\s/g,'') + '" class="phone-link-fijo">' + val + '</a>'
             : '<span class="phone-empty">—</span>')
      + '</div></div></div>';
  }

  // ── CACHÉ ────────────────────────────────────────────────────────────────
  function guardarCache(data) {
    try {
      sessionStorage.setItem(CACHE_KEY, JSON.stringify({ ts: Date.now(), data: data }));
    } catch(e) {}
  }

  function leerCache() {
    try {
      var raw = sessionStorage.getItem(CACHE_KEY);
      if (!raw) return null;
      var obj = JSON.parse(raw);
      if (Date.now() - obj.ts > CACHE_TTL) { sessionStorage.removeItem(CACHE_KEY); return null; }
      return obj.data;
    } catch(e) { return null; }
  }

  // ── CARGA ────────────────────────────────────────────────────────────────
  async function cargarColaboradores() {
    mostrarSkeletons(LOTE_INICIAL);

    var cached = leerCache();
    if (cached) {
      colaboradores = cached;
      mostrarBadgeCache();
      construirFiltros();
      filtrar();
      return;
    }

    try {
      const res = await fetch('/api/colaboradores');
      if (!res.ok) throw new Error('Error ' + res.status);
      const todos = await res.json();

      // Renderiza primer lote de inmediato
      colaboradores = todos.slice(0, LOTE_INICIAL);
      construirFiltros();
      filtrar();

      // Carga el resto sin bloquear
      if (todos.length > LOTE_INICIAL) {
        setTimeout(function() {
          colaboradores = todos;
          guardarCache(todos);
          construirFiltros();
          filtrar();
        }, 0);
      } else {
        guardarCache(todos);
      }
    } catch (e) {
      document.getElementById('grid').innerHTML =
        '<div class="sin-resultados">Error al cargar colaboradores: ' + e.message + '</div>';
    }
  }

  function mostrarBadgeCache() {
    var contador = document.getElementById('contador');
    if (!contador.querySelector('.cache-badge')) {
      var badge = document.createElement('span');
      badge.className = 'cache-badge';
      badge.title = 'Datos en caché — recarga la página para actualizar';
      badge.textContent = '⚡ caché';
      contador.appendChild(badge);
    }
  }

  // ── FILTROS ───────────────────────────────────────────────────────────────
  function construirFiltros() {
    var oficinas = [...new Set(colaboradores.map(c => c.oficina).filter(Boolean))].sort();
    var deptos   = [...new Set(colaboradores.map(c => c.departamento).filter(Boolean))].sort();

    var filtrosDiv = document.getElementById('filtros-oficina');
    // Conserva solo el botón "Todas"
    filtrosDiv.querySelectorAll('.filtro:not([data-val=""])').forEach(b => b.remove());
    oficinas.forEach(function(o) {
      var btn = document.createElement('button');
      btn.className = 'filtro';
      btn.dataset.val = o;
      btn.textContent = o;
      btn.onclick = function() { setFiltroOficina(this); };
      filtrosDiv.appendChild(btn);
    });

    var sel = document.getElementById('select-depto');
    var currentVal = sel.value;
    Array.from(sel.options).slice(1).forEach(o => o.remove());
    deptos.forEach(function(d) {
      var opt = document.createElement('option');
      opt.value = d;
      opt.textContent = d.replace('DEPARTAMENTO DE ', '');
      sel.appendChild(opt);
    });
    sel.value = currentVal;
  }

  function setFiltroOficina(btn) {
    document.querySelectorAll('#filtros-oficina .filtro').forEach(b => b.classList.remove('activo'));
    btn.classList.add('activo');
    filtroOficina = btn.dataset.val;
    filtrar();
  }

  function filtrar() {
    var q     = document.querySelector('.buscar').value.toLowerCase();
    var depto = document.getElementById('select-depto').value;

    var resultado = colaboradores.filter(function(c) {
      var matchOficina = !filtroOficina || c.oficina === filtroOficina;
      var matchDepto   = !depto || c.departamento === depto;
      var matchQ       = !q || [c.nombre, c.cargo, c.correo, c.departamento,
                                 c.telefono, c.telefonoMovil, c.movil, c.mobilePhone].some(
        function(v) { return v && v.toLowerCase().includes(q); }
      );
      return matchOficina && matchDepto && matchQ;
    });

    renderizar(resultado);
  }

  // ── RENDER ────────────────────────────────────────────────────────────────
  function tarjetaHTML(c) {
    var avatarHtml = c.foto
      ? '<img src="' + c.foto + '" alt="' + c.nombre + '" loading="lazy">'
      : iniciales(c.nombre || '?');
    var color = colorAvatar(c.nombre || '');
    var movil = c.telefonoMovil || c.movil || c.mobilePhone || null;
    var fijo  = c.telefono || c.telefonoOficina || c.businessPhone || null;

    return '<div class="tarjeta">'
      + '<div class="avatar" style="background:' + color + ';">' + avatarHtml + '</div>'
      + '<div class="nombre">' + (c.nombre || '—') + '</div>'
      + '<div class="cargo">' + (c.cargo || '') + '</div>'
      + (c.departamento ? '<div class="badge-depto">' + c.departamento.replace('DEPARTAMENTO DE ','') + '</div>' : '')
      + '<div class="phone-bars">'
      + renderBarraMovil(movil)
      + renderBarraFijo(fijo)
      + '</div>'
      + (c.correo ? '<div class="dato"><svg width="13" height="13" fill="none" stroke="#888" stroke-width="2" viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg><a href="mailto:' + c.correo + '">' + c.correo + '</a></div>' : '')
      + (c.oficina ? '<div class="badge-oficina">📍 ' + c.oficina + '</div>' : '')
      + '</div>';
  }

  function renderizar(lista) {
    var grid = document.getElementById('grid');
    document.getElementById('contador').textContent =
      lista.length + ' colaborador' + (lista.length !== 1 ? 'es' : '');

    if (!lista.length) {
      grid.innerHTML = '<div class="sin-resultados">No se encontraron colaboradores.</div>';
      return;
    }
    grid.innerHTML = lista.map(tarjetaHTML).join('');
  }

  cargarColaboradores();
</script>
</body>
</html>
