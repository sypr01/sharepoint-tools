<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Directorio de Proveedores - PLG</title>
  <style>
    :root {
      --plg-navy:  #1B3A6B;
      --plg-blue:  #2F5AA8;
      --plg-light: #5C83C1;
      --plg-red:   #CC1F2A;
      --plg-bg:    #F0F4F9;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: var(--plg-bg); color: #333; }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, var(--plg-navy) 0%, var(--plg-blue) 100%);
      color: white;
      border-bottom: 4px solid var(--plg-red);
    }
    .header-inner {
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 14px 32px;
    }
    .header-logo-wrap {
      background: white;
      border-radius: 8px;
      padding: 6px 12px;
      display: flex;
      align-items: center;
      flex-shrink: 0;
    }
    .header-logo { height: 52px; width: auto; display: block; }
    .header-divider {
      width: 1px;
      height: 40px;
      background: rgba(255,255,255,0.25);
    }
    header h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.2px; }
    header p  { font-size: 12px; opacity: 0.7; margin-top: 3px; }

    /* ── Controles ── */
    .controles {
      background: white;
      padding: 14px 32px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      border-bottom: 1px solid #dde3ed;
      position: sticky;
      top: 0;
      z-index: 10;
      box-shadow: 0 2px 8px rgba(27,58,107,0.08);
    }

    .buscar {
      flex: 1;
      min-width: 220px;
      padding: 9px 14px;
      border: 1px solid #c5cedb;
      border-radius: 6px;
      font-size: 14px;
      transition: border-color 0.2s;
    }
    .buscar:focus { outline: none; border-color: var(--plg-blue); box-shadow: 0 0 0 3px rgba(47,90,168,0.1); }

    .filtros { display: flex; gap: 8px; flex-wrap: wrap; }
    .filtro {
      padding: 6px 14px;
      border: 1px solid #c5cedb;
      border-radius: 20px;
      background: white;
      cursor: pointer;
      font-size: 13px;
      color: #555;
      transition: all 0.2s;
    }
    .filtro:hover { border-color: var(--plg-blue); color: var(--plg-blue); }
    .filtro.activo { background: var(--plg-navy); color: white; border-color: var(--plg-navy); }

    .contador { font-size: 13px; color: #778; margin-left: auto; }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
      padding: 24px 32px;
    }

    /* ── Tarjeta ── */
    .tarjeta {
      background: white;
      border-radius: 10px;
      padding: 20px;
      box-shadow: 0 1px 4px rgba(27,58,107,0.07);
      border-left: 4px solid var(--plg-navy);
      transition: box-shadow 0.2s, border-color 0.2s;
    }
    .tarjeta:hover { box-shadow: 0 6px 20px rgba(27,58,107,0.13); border-left-color: var(--plg-red); }

    .tarjeta-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
    }

    .empresa { font-size: 15px; font-weight: 700; color: var(--plg-navy); line-height: 1.3; }

    .badge {
      font-size: 10px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 12px;
      white-space: nowrap;
      text-transform: uppercase;
      letter-spacing: .3px;
    }
    .badge-NAVIERA           { background: #dbeafe; color: #1d4ed8; }
    .badge-AEROLINEA         { background: #fce7f3; color: #9d174d; }
    .badge-AGENCIA\ ADUANAL  { background: #d1fae5; color: #065f46; }
    .badge-CONSOLIDADOR      { background: #fef3c7; color: #92400e; }
    .badge-PORTUARIA         { background: #ede9fe; color: #5b21b6; }
    .badge-TRANSPORTE\ LOCAL { background: #ffedd5; color: #9a3412; }

    .dato { font-size: 13px; color: #555; margin-bottom: 6px; display: flex; gap: 6px; align-items: flex-start; }
    .dato svg { flex-shrink: 0; margin-top: 1px; }
    .dato a { color: var(--plg-blue); text-decoration: none; }
    .dato a:hover { text-decoration: underline; color: var(--plg-navy); }

    .separador { border: none; border-top: 1px solid #edf0f5; margin: 10px 0; }

    /* ── Botón registrar ── */
    .btn-registrar {
      padding: 8px 18px;
      background: var(--plg-navy);
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s;
    }
    .btn-registrar:hover { background: var(--plg-blue); }

    /* ── Botón evaluar ── */
    .btn-evaluar {
      margin-top: 12px;
      width: 100%;
      padding: 8px;
      background: var(--plg-bg);
      border: 1px solid #dde3ed;
      border-radius: 6px;
      font-size: 12px;
      color: #667;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      transition: all 0.2s;
    }
    .btn-evaluar:hover { background: #e4ecf7; border-color: var(--plg-blue); color: var(--plg-navy); }

    .estrellas-resumen { font-size: 13px; color: #666; margin-top: 8px; }
    .estrella-llena { color: #f59e0b; }
    .estrella-vacia { color: #ddd; }

    /* ── Modal ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(10,20,50,0.55);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-overlay.activo { display: flex; }

    .modal {
      background: white;
      border-radius: 12px;
      padding: 0;
      width: 100%;
      max-width: 520px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 24px 64px rgba(10,20,50,0.3);
    }
    .modal-header {
      background: linear-gradient(135deg, var(--plg-navy) 0%, var(--plg-blue) 100%);
      border-radius: 12px 12px 0 0;
      padding: 18px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .modal-header img { height: 36px; background: white; border-radius: 5px; padding: 3px 6px; }
    .modal h2 { font-size: 17px; color: white; font-weight: 700; margin: 0; }
    .modal-body { padding: 24px; }

    .campo { margin-bottom: 14px; }
    .campo label { display: block; font-size: 13px; font-weight: 600; color: #444; margin-bottom: 5px; }
    .campo input, .campo select, .campo textarea {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid #c5cedb;
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
      transition: border-color 0.2s;
    }
    .campo input:focus, .campo select:focus, .campo textarea:focus {
      outline: none;
      border-color: var(--plg-blue);
      box-shadow: 0 0 0 3px rgba(47,90,168,0.1);
    }
    .campo textarea { resize: vertical; min-height: 70px; }

    .modal-footer {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 20px;
    }
    .btn-cancelar {
      padding: 9px 18px;
      border: 1px solid #c5cedb;
      background: white;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      color: #555;
      transition: border-color 0.2s;
    }
    .btn-cancelar:hover { border-color: var(--plg-navy); color: var(--plg-navy); }
    .btn-guardar {
      padding: 9px 18px;
      background: var(--plg-navy);
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: background 0.2s;
    }
    .btn-guardar:hover { background: var(--plg-blue); }
    .btn-guardar:disabled { background: #aab; cursor: not-allowed; }

    .selector-estrellas { display: flex; gap: 6px; font-size: 28px; cursor: pointer; margin: 8px 0; }
    .selector-estrellas span { color: #ddd; transition: color 0.1s; }
    .selector-estrellas span.seleccionada,
    .selector-estrellas span.hover-activa { color: #f59e0b; }

    .evaluacion-item { border-top: 1px solid #edf0f5; padding: 10px 0; font-size: 13px; }
    .evaluacion-item .ev-encabezado { display: flex; justify-content: space-between; margin-bottom: 4px; }
    .evaluacion-item .ev-evaluador { font-weight: 600; color: #333; }
    .evaluacion-item .ev-fecha { color: #888; }
    .evaluacion-item .ev-comentario { color: #555; }

    .mensaje-ok  { color: #065f46; background: #d1fae5; padding: 10px; border-radius: 6px; font-size: 13px; margin-top: 10px; }
    .mensaje-err { color: #991b1b; background: #fee2e2; padding: 10px; border-radius: 6px; font-size: 13px; margin-top: 10px; }

    .sin-resultados {
      grid-column: 1/-1;
      text-align: center;
      padding: 60px;
      color: #888;
      font-size: 15px;
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="header-logo-wrap">
      <img src="log PLG.png" alt="PLG" class="header-logo">
    </div>
    <div class="header-divider"></div>
    <div style="flex:1;">
      <h1>Directorio de Proveedores</h1>
      <p>PANAMERICAN LOGISTICS GROUP — Operaciones 2026</p>
    </div>
    <button onclick="abrirAdminLogin()" style="background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);color:white;padding:7px 14px;border-radius:6px;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:6px;white-space:nowrap;" onmouseover="this.style.background='rgba(255,255,255,0.25)'" onmouseout="this.style.background='rgba(255,255,255,0.15)'">
      🔐 Admin
    </button>
  </div>
</header>

<div class="controles">
  <input class="buscar" type="text" placeholder="Buscar por empresa, contacto, correo..." oninput="filtrar()">
  <div class="filtros">
    <button class="filtro activo" data-tipo="" onclick="setFiltro(this)">Todos</button>
    <button class="filtro" data-tipo="NAVIERA" onclick="setFiltro(this)">Naviera</button>
    <button class="filtro" data-tipo="AEROLINEA" onclick="setFiltro(this)">Aerolínea</button>
    <button class="filtro" data-tipo="AGENCIA ADUANAL" onclick="setFiltro(this)">Ag. Aduanal</button>
    <button class="filtro" data-tipo="CONSOLIDADOR" onclick="setFiltro(this)">Consolidador</button>
    <button class="filtro" data-tipo="PORTUARIA" onclick="setFiltro(this)">Portuaria</button>
    <button class="filtro" data-tipo="TRANSPORTE LOCAL" onclick="setFiltro(this)">Transporte</button>
  </div>
  <span class="contador" id="contador"></span>
  <button class="btn-registrar" onclick="abrirModalRegistro()">+ Registrar Proveedor</button>
</div>

<div class="grid" id="grid"></div>

<!-- Modal: Registrar Proveedor -->
<div class="modal-overlay" id="modalRegistro">
  <div class="modal">
    <div class="modal-header">
      <img src="log PLG.png" alt="PLG">
      <h2 id="r-titulo-modal">Registrar Nuevo Proveedor</h2>
    </div>
    <div class="modal-body">
    <div class="campo">
      <label>Empresa *</label>
      <input type="text" id="r-empresa" placeholder="Nombre de la empresa">
    </div>
    <div class="campo">
      <label>Tipo de Servicio *</label>
      <select id="r-tipo">
        <option value="">— Seleccionar —</option>
        <option value="NAVIERA">Naviera</option>
        <option value="AEROLINEA">Aerolínea</option>
        <option value="AGENCIA ADUANAL">Agencia Aduanal</option>
        <option value="CONSOLIDADOR">Consolidador</option>
        <option value="PORTUARIA">Portuaria</option>
        <option value="TRANSPORTE LOCAL">Transporte Local</option>
      </select>
    </div>
    <div class="campo">
      <label>Dirección</label>
      <input type="text" id="r-direccion" placeholder="Dirección física">
    </div>
    <div class="campo">
      <label>Sitio Web</label>
      <input type="text" id="r-web" placeholder="https://...">
    </div>
    <div class="campo" style="margin-bottom:4px;">
      <label>Contactos</label>
    </div>
    <div id="r-contactos-lista"></div>
    <button type="button" onclick="agregarFilaContacto()" style="font-size:13px;color:#003366;background:none;border:1px dashed #003366;border-radius:6px;padding:6px 14px;cursor:pointer;margin-bottom:12px;width:100%;">+ Agregar contacto</button>
    <div id="r-mensaje"></div>
    <div class="modal-footer">
      <button class="btn-cancelar" onclick="cerrarModal('modalRegistro')">Cancelar</button>
      <button class="btn-guardar" id="r-btn-guardar" onclick="guardarProveedor()">Guardar</button>
    </div>
    </div><!-- /modal-body -->
  </div>
</div>

<!-- Modal: Evaluar Proveedor -->
<div class="modal-overlay" id="modalEvaluar">
  <div class="modal">
    <div class="modal-header">
      <img src="log PLG.png" alt="PLG">
      <h2 id="ev-titulo">Evaluar Proveedor</h2>
    </div>
    <div class="modal-body">
    <div id="ev-historial" style="margin-bottom:16px;"></div>

    <hr style="margin-bottom:16px;border:none;border-top:1px solid #edf0f5;">
    <p style="font-size:13px;font-weight:600;color:#444;margin-bottom:4px;">Nueva Evaluación</p>

    <div class="campo">
      <label>Calificación *</label>
      <div class="selector-estrellas" id="ev-estrellas">
        <span data-val="1">★</span>
        <span data-val="2">★</span>
        <span data-val="3">★</span>
        <span data-val="4">★</span>
        <span data-val="5">★</span>
      </div>
    </div>
    <div class="campo">
      <label>Comentario</label>
      <textarea id="ev-comentario" placeholder="Describe la experiencia con este proveedor..."></textarea>
    </div>
    <div class="campo">
      <label>Tu nombre *</label>
      <input type="text" id="ev-evaluador" placeholder="Nombre del evaluador">
    </div>
    <div class="campo">
      <label>Fecha del servicio *</label>
      <input type="date" id="ev-fecha">
    </div>
    <div id="ev-mensaje"></div>
    <div class="modal-footer">
      <button class="btn-cancelar" onclick="cerrarModal('modalEvaluar')">Cancelar</button>
      <button class="btn-guardar" id="ev-btn-guardar" onclick="guardarEvaluacion()">Enviar Evaluación</button>
    </div>
    </div><!-- /modal-body -->
  </div>
</div>

<!-- Modal: Admin Login -->
<div class="modal-overlay" id="modalAdminLogin">
  <div class="modal" style="max-width:360px;">
    <div class="modal-header">
      <img src="log PLG.png" alt="PLG">
      <h2>Acceso Administrador</h2>
    </div>
    <div class="modal-body">
      <div class="campo">
        <label>Contraseña</label>
        <input type="password" id="admin-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter') verificarAdmin()">
      </div>
      <div id="admin-login-msg"></div>
      <div class="modal-footer">
        <button class="btn-cancelar" onclick="cerrarModal('modalAdminLogin')">Cancelar</button>
        <button class="btn-guardar" onclick="verificarAdmin()">Ingresar</button>
      </div>
    </div>
  </div>
</div>

<!-- Modal: Panel Admin Evaluaciones -->
<div class="modal-overlay" id="modalAdmin">
  <div class="modal" style="max-width:800px;">
    <div class="modal-header" style="justify-content:space-between;">
      <div style="display:flex;align-items:center;gap:12px;">
        <img src="log PLG.png" alt="PLG">
        <h2>Administración de Evaluaciones</h2>
      </div>
      <button onclick="cerrarModal('modalAdmin')" style="background:rgba(255,255,255,0.2);border:none;color:white;font-size:20px;cursor:pointer;border-radius:4px;padding:2px 8px;">×</button>
    </div>
    <div class="modal-body">
      <div id="admin-tabla" style="overflow-x:auto;"></div>
    </div>
  </div>
</div>

  async function cargarDesdeAPI() {
    try {
      const res = await fetch('/api/proveedores');
      if (!res.ok) return;
      const items = await res.json();
      if (!Array.isArray(items) || items.length === 0) return;
      // Construir mapa desde SharePoint
      const mapaAPI = {};
      items.forEach(p => {
        const key = p.empresa || '—';
        if (!mapaAPI[key]) {
          mapaAPI[key] = { empresa: p.empresa, tipo: p.tipo, direccion: p.direccion, web: p.web, contactos: [] };
        }
        if (p.contacto || p.telefono || p.correo) {
          mapaAPI[key].contactos.push({ contacto: p.contacto, cargo: p.cargo, telefono: p.telefono, correo: p.correo });
        }
      });
      // Merge: datos embebidos como base, SharePoint sobreescribe los que ya existen allí
      const mapaFinal = {};
      empresas.forEach(e => { mapaFinal[e.empresa] = e; });
      Object.values(mapaAPI).forEach(e => { mapaFinal[e.empresa] = e; });
      empresas.length = 0;
      Object.values(mapaFinal).forEach(e => empresas.push(e));
      filtrar();
    } catch (e) { /* usar datos embebidos */ }
  }

  function setFiltro(btn) {

  function filtrar() {
    const q = document.querySelector('.buscar').value.toLowerCase();
    const resultado = empresas.filter(p => {
      const matchTipo = !tipoActivo || p.tipo === tipoActivo;
      const matchQ = !q || [p.empresa, p.direccion, p.web].some(v => v && v.toLowerCase().includes(q))
        || p.contactos.some(c => [c.contacto, c.correo, c.cargo].some(v => v && v.toLowerCase().includes(q)));
      return matchTipo && matchQ;
    });
    renderizar(resultado);
  }

  async function guardarProveedor() {
    const empresa = document.getElementById('r-empresa').value.trim();
    const tipo    = document.getElementById('r-tipo').value;
    if (!empresa || !tipo) {
      document.getElementById('r-mensaje').innerHTML = '<div class="mensaje-err">Empresa y Tipo de Servicio son obligatorios.</div>';
      return;
    }
    const filas = document.querySelectorAll('#r-contactos-lista .fila-contacto');
    const contactos = Array.from(filas).map(f => ({
      contacto: f.querySelector('.rc-contacto').value.trim(),
      cargo:    f.querySelector('.rc-cargo').value.trim(),
      telefono: f.querySelector('.rc-telefono').value.trim(),
      correo:   f.querySelector('.rc-correo').value.trim()
    })).filter(c => c.contacto || c.telefono || c.correo);

    const btn = document.getElementById('r-btn-guardar');
    btn.disabled = true;
    btn.textContent = 'Guardando...';
    const body = {
      empresa,
      tipo,
      direccion: document.getElementById('r-direccion').value.trim(),
      web:       document.getElementById('r-web').value.trim(),
      contactos: contactos.length > 0 ? contactos : [{}]
    };
    try {
      const method   = modoEdicion ? 'PUT' : 'POST';
      const urlParam = modoEdicion ? '?empresa=' + encodeURIComponent(empresaEditando) : '';
      const res = await fetch('/api/proveedores' + urlParam, {
        method,
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      if (res.ok) {
        const accion = modoEdicion ? 'actualizado' : 'registrado';
        document.getElementById('r-mensaje').innerHTML = `<div class="mensaje-ok">Proveedor ${accion} correctamente. Actualizando directorio...</div>`;
        btn.textContent = 'Guardado ✓';
        const cancelBtn = document.querySelector('#modalRegistro .btn-cancelar');
        if (cancelBtn) { cancelBtn.textContent = 'Cerrar'; cancelBtn.style.background = '#003366'; cancelBtn.style.color = 'white'; cancelBtn.style.borderColor = '#003366'; }
        await cargarDesdeAPI();
      } else {
        throw new Error('Error ' + res.status);
      }
    } catch (e) {
      document.getElementById('r-mensaje').innerHTML = `<div class="mensaje-err">Error al guardar: ${e.message}</div>`;
      btn.disabled = false;
      btn.textContent = modoEdicion ? 'Guardar Cambios' : 'Guardar';
    }
  }

  function actualizarEstrellas(n) {

    });
  }

    s.addEventListener('click', () => {
      evEstrellas = parseInt(s.dataset.val);
      actualizarEstrellas(evEstrellas);

    s.addEventListener('mouseenter', () => actualizarEstrellas(parseInt(s.dataset.val)));
    s.addEventListener('mouseleave', () => actualizarEstrellas(evEstrellas));
  });

  async function cargarEvaluaciones(empresa) {
    const div = document.getElementById('ev-historial');
    div.innerHTML = '<p style="font-size:13px;color:#888">Cargando evaluaciones...</p>';
    try {
      const res = await fetch('/api/evaluaciones?empresa=' + encodeURIComponent(empresa));
      const lista = await res.json();
      if (!lista.length) {
        div.innerHTML = '<p style="font-size:13px;color:#888">Sin evaluaciones aún.</p>';
        return;
      }
      div.innerHTML = lista.map(e => {
        const stars = '★'.repeat(e.estrellas) + '☆'.repeat(5 - e.estrellas);
        return `<div class="evaluacion-item">
          <div class="ev-encabezado">
            <span class="ev-evaluador">${e.evaluador || 'Anónimo'}</span>
            <span class="ev-fecha">${e.fecha || ''}</span>
          </div>
          <div style="color:#f59e0b;font-size:15px;">${stars}</div>
          ${e.comentario ? `<div class="ev-comentario">${e.comentario}</div>` : ''}
        </div>`;
      }).join('');
    } catch {
      div.innerHTML = '<p style="font-size:13px;color:#888">No se pudieron cargar evaluaciones.</p>';
    }
  }

  async function guardarEvaluacion() {
    if (!evEstrellas) {
      document.getElementById('ev-mensaje').innerHTML = '<div class="mensaje-err">Selecciona una calificación de 1 a 5 estrellas.</div>';
      return;
    }
    const evaluador = document.getElementById('ev-evaluador').value.trim();
    const fecha     = document.getElementById('ev-fecha').value;
    if (!evaluador || !fecha) {
      document.getElementById('ev-mensaje').innerHTML = '<div class="mensaje-err">Tu nombre y la fecha del servicio son obligatorios.</div>';
      return;
    }
    const btn = document.getElementById('ev-btn-guardar');
    btn.disabled = true;
    btn.textContent = 'Enviando...';
    const body = {
      empresa:      evEmpresaActual,
      estrellas:    evEstrellas,
      comentario:   document.getElementById('ev-comentario').value.trim(),
      evaluador,
      fechaServicio: fecha
    };
    try {
      const res = await fetch('/api/evaluaciones', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      if (res.ok) {
        document.getElementById('ev-mensaje').innerHTML = '<div class="mensaje-ok">Evaluación enviada. ¡Gracias!</div>';
        btn.textContent = 'Enviado ✓';
        await cargarEvaluaciones(evEmpresaActual);
        // Scroll al historial para ver la evaluación recién guardada
        document.getElementById('ev-historial').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        // Cambiar botón Cancelar a Cerrar
        const cancelBtn = document.querySelector('#modalEvaluar .btn-cancelar');
        if (cancelBtn) { cancelBtn.textContent = 'Cerrar'; cancelBtn.style.background = '#003366'; cancelBtn.style.color = 'white'; cancelBtn.style.borderColor = '#003366'; }
      } else {
        const errData = await res.json().catch(() => ({}));
        throw new Error('Error ' + res.status + ': ' + (errData.error?.message || errData.error || JSON.stringify(errData)));
      }
    } catch (e) {
      document.getElementById('ev-mensaje').innerHTML = `<div class="mensaje-err">Error al enviar: ${e.message}</div>`;
      btn.disabled = false;
      btn.textContent = 'Enviar Evaluación';
    }
  }

  // ── Administración de Evaluaciones ────────────────────────────
  const ADMIN_PASS = 'Barraza1983';

  function abrirAdminLogin() {
    document.getElementById('admin-pass').value = '';
    document.getElementById('admin-login-msg').innerHTML = '';
    document.getElementById('modalAdminLogin').classList.add('activo');
    setTimeout(() => document.getElementById('admin-pass').focus(), 100);
  }

  function verificarAdmin() {
    const pass = document.getElementById('admin-pass').value;
    if (pass === ADMIN_PASS) {
      cerrarModal('modalAdminLogin');
      abrirPanelAdmin();
    } else {
      document.getElementById('admin-login-msg').innerHTML = '<div class="mensaje-err">Contraseña incorrecta.</div>';
    }
  }

  async function abrirPanelAdmin() {
    document.getElementById('admin-tabla').innerHTML = '<p style="color:#888;font-size:13px;padding:20px 0;">Cargando evaluaciones...</p>';
    document.getElementById('modalAdmin').classList.add('activo');
    try {
      const res = await fetch('/api/evaluaciones');
      if (!res.ok) throw new Error('Error ' + res.status);
      const lista = await res.json();
      if (!lista.length) {
        document.getElementById('admin-tabla').innerHTML = '<p style="color:#888;font-size:13px;padding:20px 0;">No hay evaluaciones registradas.</p>';
        return;
      }
      const filas = lista.map(e => {
        const stars = '★'.repeat(e.estrellas || 0) + '☆'.repeat(5 - (e.estrellas || 0));
        const fecha = e.fecha ? e.fecha.substring(0, 10) : '—';
        return `<tr style="border-bottom:1px solid #edf0f5;">
          <td style="padding:10px 8px;font-size:13px;font-weight:600;color:#1B3A6B;">${e.empresa || '—'}</td>
          <td style="padding:10px 8px;font-size:13px;">${e.evaluador || '—'}</td>
          <td style="padding:10px 8px;color:#f59e0b;font-size:14px;">${stars}</td>
          <td style="padding:10px 8px;font-size:12px;color:#666;">${fecha}</td>
          <td style="padding:10px 8px;font-size:12px;color:#555;max-width:200px;">${e.comentario || ''}</td>
          <td style="padding:10px 8px;text-align:center;">
            <button onclick="eliminarEvaluacion('${e.id}', this)" style="background:#fee2e2;border:none;color:#991b1b;padding:5px 10px;border-radius:5px;cursor:pointer;font-size:12px;font-weight:600;" title="Eliminar">🗑️ Eliminar</button>
          </td>
        </tr>`;
      }).join('');
      document.getElementById('admin-tabla').innerHTML = `
        <p style="font-size:13px;color:#666;margin-bottom:12px;">${lista.length} evaluación${lista.length !== 1 ? 'es' : ''} registrada${lista.length !== 1 ? 's' : ''}</p>
        <table style="width:100%;border-collapse:collapse;font-family:inherit;">
          <thead>
            <tr style="background:#f0f4f9;">
              <th style="padding:10px 8px;text-align:left;font-size:12px;color:#555;font-weight:600;">Empresa</th>
              <th style="padding:10px 8px;text-align:left;font-size:12px;color:#555;font-weight:600;">Evaluador</th>
              <th style="padding:10px 8px;text-align:left;font-size:12px;color:#555;font-weight:600;">Calificación</th>
              <th style="padding:10px 8px;text-align:left;font-size:12px;color:#555;font-weight:600;">Fecha</th>
              <th style="padding:10px 8px;text-align:left;font-size:12px;color:#555;font-weight:600;">Comentario</th>
              <th style="padding:10px 8px;text-align:center;font-size:12px;color:#555;font-weight:600;">Acción</th>
            </tr>
          </thead>
          <tbody>${filas}</tbody>
        </table>`;
    } catch (e) {
      document.getElementById('admin-tabla').innerHTML = `<div class="mensaje-err">Error al cargar: ${e.message}</div>`;
    }
  }

  async function eliminarEvaluacion(id, btn) {
    if (!confirm('¿Eliminar esta evaluación? Esta acción no se puede deshacer.')) return;
    btn.disabled = true;
    btn.textContent = '...';
    try {
      const res = await fetch('/api/evaluaciones?id=' + encodeURIComponent(id), { method: 'DELETE' });
      if (res.ok) {
        btn.closest('tr').remove();
      } else {
        throw new Error('Error ' + res.status);
      }
    } catch (e) {
      alert('Error al eliminar: ' + e.message);
      btn.disabled = false;
      btn.textContent = '🗑️ Eliminar';
    }
  }
</script>
