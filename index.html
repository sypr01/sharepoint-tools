<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Directorio de Proveedores - PLG</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; color: #333; }

    header {
      background: #003366;
      color: white;
      padding: 20px 32px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    header h1 { font-size: 22px; font-weight: 600; }
    header p { font-size: 13px; opacity: 0.8; }

    .controles {
      background: white;
      padding: 16px 32px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      border-bottom: 1px solid #ddd;
      position: sticky;
      top: 0;
      z-index: 10;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    }

    .buscar {
      flex: 1;
      min-width: 220px;
      padding: 9px 14px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
    }
    .buscar:focus { outline: none; border-color: #003366; }

    .filtros { display: flex; gap: 8px; flex-wrap: wrap; }
    .filtro {
      padding: 7px 14px;
      border: 1px solid #ccc;
      border-radius: 20px;
      background: white;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
    }
    .filtro:hover { border-color: #003366; color: #003366; }
    .filtro.activo { background: #003366; color: white; border-color: #003366; }

    .contador {
      font-size: 13px;
      color: #666;
      margin-left: auto;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
      padding: 24px 32px;
    }

    .tarjeta {
      background: white;
      border-radius: 10px;
      padding: 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      border-left: 4px solid #003366;
      transition: box-shadow 0.2s;
    }
    .tarjeta:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.12); }

    .tarjeta-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
    }

    .empresa { font-size: 15px; font-weight: 600; color: #003366; line-height: 1.3; }

    .badge {
      font-size: 10px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 12px;
      white-space: nowrap;
      margin-left: 8px;
    }

    .badge-NAVIERA        { background: #dbeafe; color: #1d4ed8; }
    .badge-AEROLINEA      { background: #fce7f3; color: #9d174d; }
    .badge-AGENCIA\ ADUANAL { background: #d1fae5; color: #065f46; }
    .badge-CONSOLIDADOR   { background: #fef3c7; color: #92400e; }
    .badge-PORTUARIA      { background: #ede9fe; color: #5b21b6; }
    .badge-TRANSPORTE\ LOCAL { background: #ffedd5; color: #9a3412; }

    .dato { font-size: 13px; color: #555; margin-bottom: 6px; display: flex; gap: 6px; align-items: flex-start; }
    .dato svg { flex-shrink: 0; margin-top: 1px; }
    .dato a { color: #003366; text-decoration: none; }
    .dato a:hover { text-decoration: underline; }

    .separador { border: none; border-top: 1px solid #f0f0f0; margin: 10px 0; }

    /* Botón registrar */
    .btn-registrar {
      padding: 8px 18px;
      background: #003366;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s;
    }
    .btn-registrar:hover { background: #004a99; }

    /* Botón evaluar en tarjeta */
    .btn-evaluar {
      margin-top: 12px;
      width: 100%;
      padding: 7px;
      background: #f8f9fa;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 12px;
      color: #555;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      transition: all 0.2s;
    }
    .btn-evaluar:hover { background: #e8f0fe; border-color: #003366; color: #003366; }

    /* Estrellas mostradas */
    .estrellas-resumen { font-size: 13px; color: #666; margin-top: 8px; }
    .estrella-llena { color: #f59e0b; }
    .estrella-vacia { color: #ddd; }

    /* Modal overlay */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-overlay.activo { display: flex; }

    .modal {
      background: white;
      border-radius: 12px;
      padding: 28px;
      width: 100%;
      max-width: 520px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .modal h2 { font-size: 18px; color: #003366; margin-bottom: 20px; }

    .campo { margin-bottom: 14px; }
    .campo label { display: block; font-size: 13px; font-weight: 600; color: #444; margin-bottom: 5px; }
    .campo input, .campo select, .campo textarea {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
    }
    .campo input:focus, .campo select:focus, .campo textarea:focus {
      outline: none;
      border-color: #003366;
    }
    .campo textarea { resize: vertical; min-height: 70px; }

    .modal-footer {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 20px;
    }
    .btn-cancelar {
      padding: 9px 18px;
      border: 1px solid #ccc;
      background: white;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }
    .btn-guardar {
      padding: 9px 18px;
      background: #003366;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
    }
    .btn-guardar:hover { background: #004a99; }
    .btn-guardar:disabled { background: #999; cursor: not-allowed; }

    /* Selector de estrellas interactivo */
    .selector-estrellas { display: flex; gap: 6px; font-size: 28px; cursor: pointer; margin: 8px 0; }
    .selector-estrellas span { color: #ddd; transition: color 0.1s; }
    .selector-estrellas span.seleccionada,
    .selector-estrellas span.hover-activa { color: #f59e0b; }

    /* Lista evaluaciones dentro del modal */
    .evaluacion-item { border-top: 1px solid #f0f0f0; padding: 10px 0; font-size: 13px; }
    .evaluacion-item .ev-encabezado { display: flex; justify-content: space-between; margin-bottom: 4px; }
    .evaluacion-item .ev-evaluador { font-weight: 600; color: #333; }
    .evaluacion-item .ev-fecha { color: #888; }
    .evaluacion-item .ev-comentario { color: #555; }
    .mensaje-ok { color: #065f46; background: #d1fae5; padding: 10px; border-radius: 6px; font-size: 13px; margin-top: 10px; }
    .mensaje-err { color: #991b1b; background: #fee2e2; padding: 10px; border-radius: 6px; font-size: 13px; margin-top: 10px; }

    .sin-resultados {
      grid-column: 1/-1;
      text-align: center;
      padding: 60px;
      color: #888;
      font-size: 15px;
    }
  </style>
</head>

<header>
  <div>
    <h1>Directorio de Proveedores</h1>
    <p>PANAMERICAN LOGISTICS GROUP — Operaciones 2026 - Actualizado 26/06/2026 08:30 v2</p>
  </div>
</header>

<div class="controles">
  <input class="buscar" type="text" placeholder="Buscar por empresa, contacto, correo..." oninput="filtrar()">
  <div class="filtros">
    <button class="filtro activo" data-tipo="" onclick="setFiltro(this)">Todos</button>
    <button class="filtro" data-tipo="NAVIERA" onclick="setFiltro(this)">Naviera</button>
    <button class="filtro" data-tipo="AEROLINEA" onclick="setFiltro(this)">Aerolínea</button>
    <button class="filtro" data-tipo="AGENCIA ADUANAL" onclick="setFiltro(this)">Ag. Aduanal</button>
    <button class="filtro" data-tipo="CONSOLIDADOR" onclick="setFiltro(this)">Consolidador</button>
    <button class="filtro" data-tipo="PORTUARIA" onclick="setFiltro(this)">Portuaria</button>
    <button class="filtro" data-tipo="TRANSPORTE LOCAL" onclick="setFiltro(this)">Transporte</button>
  </div>
  <span class="contador" id="contador"></span>
  <button class="btn-registrar" onclick="abrirModalRegistro()">+ Registrar Proveedor</button>
</div>

<div class="grid" id="grid"></div>

<!-- Modal: Registrar Proveedor -->
<div class="modal-overlay" id="modalRegistro">
  <div class="modal">
    <h2>Registrar Nuevo Proveedor</h2>
    <div class="campo">
      <label>Empresa *</label>
      <input type="text" id="r-empresa" placeholder="Nombre de la empresa">
    </div>
    <div class="campo">
      <label>Tipo de Servicio *</label>
      <select id="r-tipo">
        <option value="">— Seleccionar —</option>
        <option value="NAVIERA">Naviera</option>
        <option value="AEROLINEA">Aerolínea</option>
        <option value="AGENCIA ADUANAL">Agencia Aduanal</option>
        <option value="CONSOLIDADOR">Consolidador</option>
        <option value="PORTUARIA">Portuaria</option>
        <option value="TRANSPORTE LOCAL">Transporte Local</option>
      </select>
    </div>
    <div class="campo">
      <label>Contacto</label>
      <input type="text" id="r-contacto" placeholder="Nombre del contacto">
    </div>
    <div class="campo">
      <label>Cargo</label>
      <input type="text" id="r-cargo" placeholder="Cargo del contacto">
    </div>
    <div class="campo">
      <label>Teléfono</label>
      <input type="text" id="r-telefono" placeholder="+503 0000-0000">
    </div>
    <div class="campo">
      <label>Correo</label>
      <input type="email" id="r-correo" placeholder="correo@empresa.com">
    </div>
    <div class="campo">
      <label>Dirección</label>
      <input type="text" id="r-direccion" placeholder="Dirección física">
    </div>
    <div class="campo">
      <label>Sitio Web</label>
      <input type="text" id="r-web" placeholder="https://...">
    </div>
    <div id="r-mensaje"></div>
    <div class="modal-footer">
      <button class="btn-cancelar" onclick="cerrarModal('modalRegistro')">Cancelar</button>
      <button class="btn-guardar" id="r-btn-guardar" onclick="guardarProveedor()">Guardar</button>
    </div>
  </div>
</div>

<!-- Modal: Evaluar Proveedor -->
<div class="modal-overlay" id="modalEvaluar">
  <div class="modal">
    <h2 id="ev-titulo">Evaluar Proveedor</h2>

    <div id="ev-historial" style="margin-bottom:16px;"></div>

    <hr style="margin-bottom:16px;">
    <p style="font-size:13px;font-weight:600;color:#444;margin-bottom:4px;">Nueva Evaluación</p>

    <div class="campo">
      <label>Calificación *</label>
      <div class="selector-estrellas" id="ev-estrellas">
        <span data-val="1">★</span>
        <span data-val="2">★</span>
        <span data-val="3">★</span>
        <span data-val="4">★</span>
        <span data-val="5">★</span>
      </div>
    </div>
    <div class="campo">
      <label>Comentario</label>
      <textarea id="ev-comentario" placeholder="Describe la experiencia con este proveedor..."></textarea>
    </div>
    <div class="campo">
      <label>Tu nombre *</label>
      <input type="text" id="ev-evaluador" placeholder="Nombre del evaluador">
    </div>
    <div class="campo">
      <label>Fecha del servicio *</label>
      <input type="date" id="ev-fecha">
    </div>
    <div id="ev-mensaje"></div>
    <div class="modal-footer">
      <button class="btn-cancelar" onclick="cerrarModal('modalEvaluar')">Cancelar</button>
      <button class="btn-guardar" id="ev-btn-guardar" onclick="guardarEvaluacion()">Enviar Evaluación</button>
    </div>
  </div>
</div>

        </div>` : ''}
        ${p.web ? `<div class="dato">
          <svg width="14" height="14" fill="none" stroke="#888" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
          <a href="${p.web}" target="_blank">${p.web}</a>
        </div>` : ''}
        <button class="btn-evaluar" onclick="abrirModalEvaluar(${JSON.stringify(p.empresa)})">
          ★ Ver evaluaciones / Evaluar
        </button>
      </div>
    `).join('');
  }

  // ── Modal helpers ──────────────────────────────────────────────
  function cerrarModal(id) {
    document.getElementById(id).classList.remove('activo');
  }
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      document.querySelectorAll('.modal-overlay.activo').forEach(m => m.classList.remove('activo'));
    }
  });

  // ── Registrar Proveedor ────────────────────────────────────────
  function abrirModalRegistro() {
    ['r-empresa','r-tipo','r-contacto','r-cargo','r-telefono','r-correo','r-direccion','r-web'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.value = '';
    });
    document.getElementById('r-mensaje').innerHTML = '';
    document.getElementById('r-btn-guardar').disabled = false;
    document.getElementById('modalRegistro').classList.add('activo');
  }

  async function guardarProveedor() {
    const empresa = document.getElementById('r-empresa').value.trim();
    const tipo    = document.getElementById('r-tipo').value;
    if (!empresa || !tipo) {
      document.getElementById('r-mensaje').innerHTML = '<div class="mensaje-err">Empresa y Tipo de Servicio son obligatorios.</div>';
      return;
    }
    const btn = document.getElementById('r-btn-guardar');
    btn.disabled = true;
    btn.textContent = 'Guardando...';
    const body = {
      empresa,
      tipo,
      contacto:  document.getElementById('r-contacto').value.trim(),
      cargo:     document.getElementById('r-cargo').value.trim(),
      telefono:  document.getElementById('r-telefono').value.trim(),
      correo:    document.getElementById('r-correo').value.trim(),
      direccion: document.getElementById('r-direccion').value.trim(),
      web:       document.getElementById('r-web').value.trim()
    };
    try {
      const res = await fetch('/api/proveedores', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      if (res.ok) {
        document.getElementById('r-mensaje').innerHTML = '<div class="mensaje-ok">Proveedor registrado correctamente. Actualiza la página para verlo en el directorio.</div>';
        btn.textContent = 'Guardado ✓';
      } else {
        throw new Error('Error ' + res.status);
      }
    } catch (e) {
      document.getElementById('r-mensaje').innerHTML = `<div class="mensaje-err">Error al guardar: ${e.message}</div>`;
      btn.disabled = false;
      btn.textContent = 'Guardar';
    }
  }

  // ── Evaluar Proveedor ──────────────────────────────────────────
  let evEmpresaActual = '';
  let evEstrellas = 0;

  function abrirModalEvaluar(empresa) {
    evEmpresaActual = empresa;
    evEstrellas = 0;
    document.getElementById('ev-titulo').textContent = 'Evaluar: ' + empresa;
    document.getElementById('ev-comentario').value = '';
    document.getElementById('ev-evaluador').value = '';
    document.getElementById('ev-fecha').value = '';
    document.getElementById('ev-mensaje').innerHTML = '';
    document.getElementById('ev-btn-guardar').disabled = false;
    document.getElementById('ev-btn-guardar').textContent = 'Enviar Evaluación';
    actualizarEstrellas(0);
    cargarEvaluaciones(empresa);
    document.getElementById('modalEvaluar').classList.add('activo');
  }

  function actualizarEstrellas(n) {
    document.querySelectorAll('#ev-estrellas span').forEach((s, i) => {
      s.classList.toggle('seleccionada', i < n);
    });
  }

  document.querySelectorAll('#ev-estrellas span').forEach(s => {
    s.addEventListener('click', () => {
      evEstrellas = parseInt(s.dataset.val);
      actualizarEstrellas(evEstrellas);
    });
    s.addEventListener('mouseenter', () => actualizarEstrellas(parseInt(s.dataset.val)));
    s.addEventListener('mouseleave', () => actualizarEstrellas(evEstrellas));
  });

  async function cargarEvaluaciones(empresa) {
    const div = document.getElementById('ev-historial');
    div.innerHTML = '<p style="font-size:13px;color:#888">Cargando evaluaciones...</p>';
    try {
      const res = await fetch('/api/evaluaciones?empresa=' + encodeURIComponent(empresa));
      const lista = await res.json();
      if (!lista.length) {
        div.innerHTML = '<p style="font-size:13px;color:#888">Sin evaluaciones aún.</p>';
        return;
      }
      div.innerHTML = lista.map(e => {
        const stars = '★'.repeat(e.estrellas) + '☆'.repeat(5 - e.estrellas);
        return `<div class="evaluacion-item">
          <div class="ev-encabezado">
            <span class="ev-evaluador">${e.evaluador || 'Anónimo'}</span>
            <span class="ev-fecha">${e.fecha || ''}</span>
          </div>
          <div style="color:#f59e0b;font-size:15px;">${stars}</div>
          ${e.comentario ? `<div class="ev-comentario">${e.comentario}</div>` : ''}
        </div>`;
      }).join('');
    } catch {
      div.innerHTML = '<p style="font-size:13px;color:#888">No se pudieron cargar evaluaciones.</p>';
    }
  }

  async function guardarEvaluacion() {
    if (!evEstrellas) {
      document.getElementById('ev-mensaje').innerHTML = '<div class="mensaje-err">Selecciona una calificación de 1 a 5 estrellas.</div>';
      return;
    }
    const evaluador = document.getElementById('ev-evaluador').value.trim();
    const fecha     = document.getElementById('ev-fecha').value;
    if (!evaluador || !fecha) {
      document.getElementById('ev-mensaje').innerHTML = '<div class="mensaje-err">Tu nombre y la fecha del servicio son obligatorios.</div>';
      return;
    }
    const btn = document.getElementById('ev-btn-guardar');
    btn.disabled = true;
    btn.textContent = 'Enviando...';
    const body = {
      empresa:      evEmpresaActual,
      estrellas:    evEstrellas,
      comentario:   document.getElementById('ev-comentario').value.trim(),
      evaluador,
      fechaServicio: fecha
    };
    try {
      const res = await fetch('/api/evaluaciones', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      if (res.ok) {
        document.getElementById('ev-mensaje').innerHTML = '<div class="mensaje-ok">Evaluación enviada. ¡Gracias!</div>';
        btn.textContent = 'Enviado ✓';
        cargarEvaluaciones(evEmpresaActual);
      } else {
        throw new Error('Error ' + res.status);
      }
    } catch (e) {
      document.getElementById('ev-mensaje').innerHTML = `<div class="mensaje-err">Error al enviar: ${e.message}</div>`;
      btn.disabled = false;
      btn.textContent = 'Enviar Evaluación';
    }
  }
</script>
</body>
</html>
