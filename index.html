<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Directorio de Proveedores - PLG</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; color: #333; }

    header {
      background: #003366;
      color: white;
      padding: 20px 32px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    header h1 { font-size: 22px; font-weight: 600; }
    header p { font-size: 13px; opacity: 0.8; }

    .controles {
      background: white;
      padding: 16px 32px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      border-bottom: 1px solid #ddd;
      position: sticky;
      top: 0;
      z-index: 10;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    }

    .buscar {
      flex: 1;
      min-width: 220px;
      padding: 9px 14px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
    }
    .buscar:focus { outline: none; border-color: #003366; }

    .filtros { display: flex; gap: 8px; flex-wrap: wrap; }
    .filtro {
      padding: 7px 14px;
      border: 1px solid #ccc;
      border-radius: 20px;
      background: white;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
    }
    .filtro:hover { border-color: #003366; color: #003366; }
    .filtro.activo { background: #003366; color: white; border-color: #003366; }

    .contador {
      font-size: 13px;
      color: #666;
      margin-left: auto;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
      padding: 24px 32px;
    }

    .tarjeta {
      background: white;
      border-radius: 10px;
      padding: 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      border-left: 4px solid #003366;
      transition: box-shadow 0.2s;
    }
    .tarjeta:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.12); }

    .tarjeta-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
    }

    .empresa { font-size: 15px; font-weight: 600; color: #003366; line-height: 1.3; }

    .badge {
      font-size: 10px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 12px;
      white-space: nowrap;
      margin-left: 8px;
    }

    .badge-NAVIERA        { background: #dbeafe; color: #1d4ed8; }
    .badge-AEROLINEA      { background: #fce7f3; color: #9d174d; }
    .badge-AGENCIA\ ADUANAL { background: #d1fae5; color: #065f46; }
    .badge-CONSOLIDADOR   { background: #fef3c7; color: #92400e; }
    .badge-PORTUARIA      { background: #ede9fe; color: #5b21b6; }
    .badge-TRANSPORTE\ LOCAL { background: #ffedd5; color: #9a3412; }

    .dato { font-size: 13px; color: #555; margin-bottom: 6px; display: flex; gap: 6px; align-items: flex-start; }
    .dato svg { flex-shrink: 0; margin-top: 1px; }
    .dato a { color: #003366; text-decoration: none; }
    .dato a:hover { text-decoration: underline; }

    .separador { border: none; border-top: 1px solid #f0f0f0; margin: 10px 0; }

    .sin-resultados {
      grid-column: 1/-1;
      text-align: center;
      padding: 60px;
      color: #888;
      font-size: 15px;
    }
  </style>
</head>
<body>

</header>

<div class="controles">

    <button class="filtro" data-tipo="NAVIERA" onclick="setFiltro(this)">Naviera</button>
    <button class="filtro" data-tipo="AEROLINEA" onclick="setFiltro(this)">Aerolínea</button>
    <button class="filtro" data-tipo="AGENCIA ADUANAL" onclick="setFiltro(this)">Ag. Aduanal</button>
    <button class="filtro" data-tipo="CONSOLIDADOR" onclick="setFiltro(this)">Consolidador</button>
    <button class="filtro" data-tipo="PORTUARIA" onclick="setFiltro(this)">Portuaria</button>
    <button class="filtro" data-tipo="TRANSPORTE LOCAL" onclick="setFiltro(this)">Transporte</button>
  </div>
  <span class="contador" id="contador"></span>
</div>

<div class="grid" id="grid"></div>

  let tipoActivo = '';
  filtrar();

  function setFiltro(btn) {
    document.querySelectorAll('.filtro').forEach(b => b.classList.remove('activo'));
    btn.classList.add('activo');
    tipoActivo = btn.dataset.tipo;
    filtrar();
  }

  function filtrar() {
    const q = document.querySelector('.buscar').value.toLowerCase();
    const resultado = datos.filter(p => {
      const matchTipo = !tipoActivo || p.tipo === tipoActivo;
      const matchQ = !q || [p.empresa, p.contacto, p.correo, p.cargo].some(v => v && v.toLowerCase().includes(q));
      return matchTipo && matchQ;
    });
    renderizar(resultado);
  }

  function renderizar(lista) {
    const grid = document.getElementById('grid');
    document.getElementById('contador').textContent = `${lista.length} proveedor${lista.length !== 1 ? 'es' : ''}`;

      grid.innerHTML = '<div class="sin-resultados">No se encontraron proveedores con ese criterio.</div>';
      return;
    }

      <div class="tarjeta">

          <div class="empresa">${p.empresa || '—'}</div>
          <span class="badge badge-${p.tipo}">${p.tipo || ''}</span>

    `).join('');
